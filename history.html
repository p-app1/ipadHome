<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget History - iPad Home</title>
    <link rel="stylesheet" href="css/history.css">
</head>
<body>
    <div class="history-container">
        <div class="history-header">
            <h1>Budget History</h1>
            <a href="index.html" class="btn-back">← Back to App</a>
        </div>

        <div class="history-content" id="historyContent">
            <div class="no-weeks">No archived weeks yet. Start archiving weeks to see history here!</div>
        </div>
    </div>

    <div id="weekModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/history.js"></script>
</body>
</html>
